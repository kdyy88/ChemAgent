services:
  backend:
    build:
      context: ./backend
    ports:
      - "3030:3030"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - SERPER_API_KEY=${SERPER_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
