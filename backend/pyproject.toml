[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ag2[openai]>=0.11.4",
    "arq>=0.27",
    "fastapi>=0.135.2",
    "hiredis>=3.3",
    "httpx>=0.28",
    "openbabel-wheel>=3.1.1.23",
    "python-dotenv>=1.2",
    "python-multipart>=0.0.22",
    "rdkit>=2025.9.6",
    # redis 7.x is blocked by arq==0.27.0 which requires redis>=4.2,<6.
    # Pin to the latest 5.x release until arq adds redis 7.x support.
    "redis>=5.3,<6",
    "requests>=2.32.5",
    "slowapi>=0.1.9",
    "uvicorn>=0.42",
    "waldiez>=0.7.1",
    "websockets>=16.0",
]

[project.optional-dependencies]
dev = [
    "fakeredis>=2.34",
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
]

[tool.uv.sources]
waldiez = { git = "https://github.com/waldiez/waldiez.git" }
