services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chemagent-backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      # Tell glibc to aggressively return freed memory back to the OS.
      # Without this, Python's allocator holds onto large heaps (RDKit / OpenBabel
      # import spikes) even after the objects are GC'd, which exhausts host RAM.
      MALLOC_TRIM_THRESHOLD_: "65536"
      PYTHONMALLOC: malloc
    ports:
      - "3030:3030"
    deploy:
      resources:
        limits:
          memory: 1.8g     # 严控后端内存，防止打爆 4G 服务器
        reservations:
          memory: 512m     # 降低预留，提升主机调度灵活性
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3030/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s   # RDKit + OpenBabel cold-import can take 20-30 s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    container_name: chemagent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
      NEXT_TELEMETRY_DISABLED: 1
    deploy:
      resources:
        limits:
          memory: 768m     # 前端限制回调，避免挤占系统内存
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    container_name: chemagent-gateway
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443" # 映射 HTTPS 端口
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/.acme.sh/bluesothis.com_ecc:/etc/nginx/ssl/:ro
    deploy:
      resources:
        limits:
          memory: 96m
        reservations:
          memory: 32m