services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: chemagent-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chemagent-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      FAST_MODEL: ${FAST_MODEL:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHEMAGENT_WORKER_MAX_JOBS: ${CHEMAGENT_WORKER_MAX_JOBS:-2}
      CHEMAGENT_WORKER_JOB_TIMEOUT_SECONDS: ${CHEMAGENT_WORKER_JOB_TIMEOUT_SECONDS:-120}
      TASK_POLL_INTERVAL_SECONDS: ${TASK_POLL_INTERVAL_SECONDS:-0.2}
      ARTIFACT_TTL_SECONDS: ${ARTIFACT_TTL_SECONDS:-300}
      # Tell glibc to aggressively return freed memory back to the OS.
      # Without this, Python's allocator holds onto large heaps (RDKit / OpenBabel
      # import spikes) even after the objects are GC'd, which exhausts host RAM.
      MALLOC_TRIM_THRESHOLD_: "65536"
      PYTHONMALLOC: malloc
    ports:
      - "127.0.0.1:3030:3030"
    deploy:
      resources:
        limits:
          memory: 1.2g     # API/WebSocket 网关进程不再直接承载重计算
        reservations:
          memory: 512m     # 降低预留，提升主机调度灵活性
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3030/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s   # RDKit + OpenBabel cold-import can take 20-30 s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chemagent-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      FAST_MODEL: ${FAST_MODEL:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHEMAGENT_WORKER_MAX_JOBS: ${CHEMAGENT_WORKER_MAX_JOBS:-2}
      CHEMAGENT_WORKER_JOB_TIMEOUT_SECONDS: ${CHEMAGENT_WORKER_JOB_TIMEOUT_SECONDS:-120}
      TASK_RESULT_TTL_SECONDS: ${TASK_RESULT_TTL_SECONDS:-300}
      ARTIFACT_TTL_SECONDS: ${ARTIFACT_TTL_SECONDS:-300}
      MALLOC_TRIM_THRESHOLD_: "65536"
      PYTHONMALLOC: malloc
    command: ["arq", "app.worker.WorkerSettings"]
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    healthcheck:
      # arq worker has no HTTP endpoint; verify it can reach Redis instead
      test: ["CMD", "python", "-c", "import redis, os; redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379/0')).ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    container_name: chemagent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
      NEXT_TELEMETRY_DISABLED: 1
      # Server-side rewrite target for Next.js SSR → FastAPI
      # (browser requests are routed by nginx, but SSR fetches need this)
      BACKEND_INTERNAL_URL: http://backend:3030
    deploy:
      resources:
        limits:
          memory: 768m     # 前端限制回调，避免挤占系统内存
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: chemagent-gateway
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
        restart: true
      backend:
        condition: service_healthy
        restart: true
    ports:
      - "80:80"
      - "443:443" # 映射 HTTPS 端口
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/.acme.sh/bluesothis.com_ecc:/etc/nginx/ssl/:ro
    deploy:
      resources:
        limits:
          memory: 96m
        reservations:
          memory: 32m