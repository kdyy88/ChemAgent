server {
    listen 80;
    server_name _;

    # Disable Nagle's algorithm globally — critical for real-time WebSocket frames
    tcp_nodelay on;

    client_max_body_size 20m;

    location /api/chat/ws {
        proxy_pass http://backend:3030/api/chat/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        # Prevent nginx from buffering WebSocket frames — ensures each frame
        # is forwarded to the client immediately instead of being held until
        # the buffer fills or the connection closes.
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/ {
        proxy_pass http://backend:3030/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}