# 1. HTTP Server - 负责重定向到 HTTPS
server {
    listen 80;
    server_name bluesothis.com www.bluesothis.com;

    # 强制所有请求跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server - 处理核心业务
server {
    listen 443 ssl;
    server_name bluesothis.com www.bluesothis.com;

    # 证书路径（需对应 docker-compose 中挂载到容器内的路径）
    ssl_certificate     /etc/nginx/ssl/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/bluesothis.com.key;

    # SSL 优化配置（可选但推荐）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 全局参数
    tcp_nodelay on;
    client_max_body_size 20m;

    # --- API WebSocket 代理 ---
    location /api/chat/ws {
        proxy_pass http://backend:3030/api/chat/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 实时性关键配置
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering off;
        proxy_cache off;
    }

    # --- API 常规接口代理 ---
    location /api/ {
        proxy_pass http://backend:3030/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 防止流式响应被缓存（如 Server-Sent Events）
        proxy_buffering off;
    }

    # --- Frontend 静态资源/页面代理 ---
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}